url: https://github.com/matt/ModelBlueprint

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2563eb"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

home:
  title: "ModelBlueprint"
  description: >
    A model-agnostic container for managing machine learning model lifecycles
    in R. One-way plots, partial dependence plots, calibration charts, and
    residual diagnostics — all driven directly from your fitted model object.

  links:
  - text: Report a bug
    href: https://github.com/matt/ModelBlueprint/issues

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/matt/ModelBlueprint

reference:

- title: "The ModelBlueprint class"
  desc: >
    The core S7 class that wraps a fitted model with its data, pipeline
    functions, and metadata. All other functions in the package operate on
    `ModelBlueprint` objects.
  contents:
  - ModelBlueprint

- title: "Predict"
  desc: >
    Generate predictions from a `ModelBlueprint`. Applies the full pipeline:
    pre-processing → feature engineering → model prediction → post-processing.
  contents:
  - predict.ModelBlueprint

- title: "Analysis plots"
  desc: >
    Core diagnostic plots. Each function works on a plain `data.frame` or
    dispatches automatically from a `ModelBlueprint`, pulling the target,
    exposure, and model from the object's slots.
  contents:
  - one_way
  - starts_with("one_way.")
  - pdp
  - starts_with("pdp.")
  - gain
  - starts_with("gain.")
  - pred_vs_obs
  - starts_with("pred_vs_obs.")
  - residuals_grouped
  - starts_with("residuals_grouped.")
  - sami
  - starts_with("sami.")

- title: "Save and load"
  desc: >
    Persist a `ModelBlueprint` to disk and restore it in a later session.
    Supports native R models and H2O models. Data slots saved as Feather
    files for speed; factor levels are preserved exactly.
  contents:
  - saveMB
  - loadMB

- title: "Data manipulation"
  desc: >
    Pipe-friendly methods for filtering, mutating, and joining data within
    a `ModelBlueprint`'s internal datasets. Each method returns a new
    `ModelBlueprint` — the original is never mutated.
  contents:
  - filter.ModelBlueprint
  - mutate.ModelBlueprint
  - left_join.ModelBlueprint

- title: "Utilities"
  desc: >
    Helper functions for data preparation.
  contents:
  - unitize

- title: "Example ModelBlueprints"
  desc: >
    Ready-to-run `ModelBlueprint` constructors covering common R model types.
    All use the built-in `mtcars` dataset. Useful for learning, testing, and
    reproducing examples from the documentation.
  contents:
  - mb_examples

articles:
- title: "Getting started"
  navbar: "Getting started"
  contents:
  - getting-started

- title: "Analysis"
  navbar: "Analysis"
  contents:
  - one-way-plots
  - partial-dependence-plots
  - model-diagnostics